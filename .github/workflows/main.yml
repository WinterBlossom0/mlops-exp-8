name: MLOps CI Pipeline

on:
  push:
    branches:
      - main
      - a
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  train-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up CML
        uses: iterative/setup-cml@v2

      - name: Train and evaluate model
        run: |
          python model1.py
          {
            echo "# Experiment 8 Report"
            echo
            echo "## Metrics"
            cat metrics.txt
            echo
            echo "## Model Performance"
            echo "![Regression results](./model_results.png)"
          } > report.md

      - name: Publish CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cml comment create report.md

      - name: Start Flask API
        run: |
          nohup python app.py > flask.log 2>&1 &
          sleep 5

      - name: Test API endpoint
        run: |
          curl --fail --show-error --silent \
            -X POST http://127.0.0.1:5000/predict \
            -H "Content-Type: application/json" \
            -d '{"input":[5]}' > api_response.json
          cat api_response.json
